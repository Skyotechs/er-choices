kind = "web"
previewPath = "/web/"
title = "ER Choices Web"
version = "1.0.0"
id = "artifacts/er-choices-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/web/" ]
localPort = 21176

[services.development]
run = "pnpm --filter @workspace/er-choices-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/er-choices-web", "run", "build" ]
publicDir = "artifacts/er-choices-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21176"
BASE_PATH = "/web/"
